exchanges:
  upbit:
    enabled: false           # OKX 전용 모드 — Upbit 비활성화
    paper_trading: false
    allocation: 0.5          # 전체 자산 중 이 거래소 비중 50%
  bithumb:
    enabled: false           # API 키 입력 후 true로 변경
    paper_trading: true
    allocation: 0.25
  okx:
    enabled: true
    paper_trading: false
    allocation: 0.25         # USDT 기준 운용

markets:
  - KRW-BTC
  - KRW-ETH

# 거래소별 거래 종목 — 8종목 집중 (자본 분산 최소화)
# 시가총액 상위 + 유동성 풍부 + OKX 선물 지원 종목
exchange_markets:
  upbit:
    - KRW-BTC    # 1위
    - KRW-ETH    # 2위
    - KRW-SOL    # 4위
    - KRW-XRP    # 5위
    - KRW-DOGE   # 6위
    - KRW-LINK   # 9위
    - KRW-AVAX   # 8위
    - KRW-SUI    # 20위
  okx:
    - KRW-BTC    # 1위
    - KRW-ETH    # 2위
    - KRW-BNB    # 3위
    - KRW-SOL    # 4위
    - KRW-XRP    # 5위
    - KRW-DOGE   # 6위
    - KRW-LINK   # 9위
    - KRW-SUI    # 20위

# asset_weights: CoinGecko 시가총액 기반 동적 계산으로 대체 (매시 갱신)
# 폴백(API 실패 시): 동일 비중 1/8 = 12.5% 씩
asset_weights: {}  # runtime에 refresh_asset_weights()로 채워짐

trading:
  initial_capital: 1000000       # 초기 투자금 (원)
  max_position_ratio: 0.25       # 종목당 최대 비중 25% (워뇨띠: 20~30%)
  stop_loss_pct: -0.04           # 스윙 롱 손절 -4% (장투: 여유있게)
  take_profit_pct: 0.08          # 스윙 롱 익절 +8% (장투: 목표 높게)
  daily_loss_limit_pct: -0.20    # 일일 최대 손실 -20% (워뇨띠 기준)
  min_order_amount: 5000         # 최소 주문금액 (원)

strategies:
  volatility_breakout:
    k: 0.4                       # 변동폭 비율 — 백테스트 최적값 (샤프 1.334, 승률 70%)
    interval: "day"              # 캔들 단위
    enabled: true
    volume_multiplier: 1.5       # 거래량 급증 기준 배수 (워뇨띠)
    volume_lookback: 20          # 거래량 평균 기간
    vp_lookback: 20              # Volume Profile 기간 (웅크웅크)
    vp_bins: 50                  # 가격 구간 수
    fib_lookback: 50             # 피보나치 스윙 탐색 기간 (웅크웅크)
    short_consec: 1              # 숏 진입 연속 하락 봉 수 (일봉 기준) — Supertrend 사용 시 대체됨
    # ── 신규 지표 (백테스트로 효과 검증 후 true 전환) ──
    use_supertrend: true         # Supertrend 추세 필터 (OKX 숏 정확도↑)
    supertrend_period: 7
    supertrend_multiplier: 3.0
    use_macd_filter: false        # MACD 방향 필터 OFF — 하락장 숏 진입 기회 확대 (4AND→3AND)
    use_atr_sl: true             # ATR 동적 SL/TP (고정 % 대체)
    atr_period: 14
    atr_sl_multiplier: 2.0       # 롱 SL = 진입가 + ATR × 2.0 (장투: 여유)
    atr_tp_multiplier: 4.0       # 롱 TP = 진입가 + ATR × 4.0 (장투: 목표 높게)
    short_atr_sl_multiplier: 1.0 # 숏 SL = 진입가 + ATR × 1.0 (단타: 타이트, 급등 방지)
    short_atr_tp_multiplier: 2.0 # 숏 TP = 진입가 - ATR × 2.0 (단타: 빠른 익절)
    use_rsi_divergence: true     # RSI 다이버전스 confidence boost (EmperorBTC 활성화)
    use_bb_squeeze: false        # BB squeeze confidence boost (스캘핑 효과적)

  moving_average:
    short_window: 5
    long_window: 20
    interval: "day"
    enabled: true

  rsi:
    period: 14
    oversold: 30
    overbought: 70
    interval: "day"
    enabled: false

# OKX 선물 설정
okx_futures:
  use_short: true
  leverage: 1                  # 1x = 레버리지 없음 (원금만 위험)
  margin_mode: isolated        # isolated: 포지션별 독립 / cross: 전체 잔고 공유
  # ── 시가총액 가중치 상한 (쏠림 방지) ──────────────────
  weight_cap_btc: 0.30         # BTC 최대 비중 30%
  weight_cap_eth: 0.20         # ETH 최대 비중 20%
  weight_cap_alt: 0.08         # 알트코인 종목당 최대 비중 8%

# ── 단타 전략 (OKX 전용, 1시간봉) ───────────────────────
# 설계 원칙:
#   - 일봉 MA200 방향과 반드시 일치 (워뇨띠 원칙)
#   - 롱 단타: OKX 현물 / 숏 단타: OKX 선물 (스윙 숏과 충돌 방지)
#   - 자본은 OKX 잔고의 30% 별도 할당
#   - 손익비 1.67:1 (TP +2.0% / SL -1.2%)
#   - 최대 보유 6시간 (시간 손절로 무한 보유 방지)
scalp_trading:
  enabled: true
  timeframe: minute60            # 1시간봉
  total_capital_ratio: 0.30      # OKX 잔고의 30% = 전체 단타 자본 (종목별 = 30% × 시가총액가중치)
  capital_ratio: 0.075           # 하위 호환용 (total_capital_ratio 없을 때 폴백)
  k: 0.08                        # 돌파 민감도 최대화 — 진입 빈도 극대화 (기존 0.18)
  ma_period: 50                  # 50H ≈ 2일 단기 추세
  volume_multiplier: 1.0         # 거래량 필터 완화 — 진입 빈도 확대 (기존 1.2)
  volume_lookback: 20
  vp_lookback: 20
  vp_bins: 30
  fib_lookback: 30
  # ── 롱 단타 (장투 방향) ────────────────────────────────
  stop_loss_pct: -0.010          # -0.015 → -0.010: 타이트 손절 (빠른 컷)
  take_profit_pct: 0.015         # 0.025 → 0.015: 빠른 익절 (수익 즉시 실현)
  max_holding_hours: 4           # 12H → 4H: 자본 재활용 빠르게
  # ── 숏 단타 전용 (단기 빠른 진출, 급등 손절) ────────────
  short_stop_loss_pct: -0.006    # -0.008 → -0.006: 더 타이트 (급등 즉시 손절)
  short_take_profit_pct: 0.010   # 0.012 → 0.010: 더 빠른 익절
  short_max_holding_hours: 1     # 2H → 1H: 1시간 내 청산
  short_consec: 1                # 숏 진입 연속 하락 봉 수 (1H봉 기준) — use_supertrend시 대체됨
  use_supertrend: true           # Supertrend 방향 필터 (consec_down 대체, 1H 스캘프 숏 정확도↑)
  # ── RSI 반등/되돌림 보조 신호 (VB signal=0 보완) ─────────────
  rsi_oversold_long: 28          # RSI 이하 + 양봉 → 반등 롱 단타 신호
  rsi_overbought_short: 68       # RSI 이상 + 하락추세 → 되돌림 숏 단타 신호
  supertrend_period: 7
  supertrend_multiplier: 3.0
  daily_loss_limit_pct: -0.10   # 단타 일일 손실 한도 -10%
  # 동적 레버리지 (확신도 1~5 → 1x~max_leverage)
  max_leverage: 5                # 최대 레버리지 (확신도 5일 때 적용)
  # 확신도 → 레버리지 매핑: 1→1x, 2→2x, 3→3x, 4→4x, 5→5x
  # Top Trader 혼합 신호 임계값
  top_trader_follow_threshold: 0.55   # 이 이상 → 순추종 +1
  top_trader_extreme_threshold: 0.75  # 이 이상 → 역추종 차단 + 반대방향 +2

backtest:
  start_date: "2022-01-01"
  end_date: "2024-12-31"
  commission: 0.0005             # 수수료 0.05%
  slippage: 0.001                # 슬리피지 0.1%

notification:
  telegram:
    enabled: false
    token: ""
    chat_id: ""

# ── 매크로 환경 지표 통합 ──────────────────────────────────────────────────────
# 실시간 외부 데이터(공포탐욕지수, 펀딩비, BTC도미넌스 등)를 단타 확신도에 반영
macro_factors:
  enabled: true
  # ── 무료 API 키 (없으면 해당 지표 자동 비활성화) ──
  finnhub_token: ""          # VIX 조회용 — https://finnhub.io 무료 등록
  alpha_vantage_key: ""      # DXY 조회용 — https://www.alphavantage.co 무료 등록
  # ── 캐시 TTL (초): 동일 데이터 반복 호출 방지 ──────
  fgi_ttl: 3600              # Fear & Greed Index: 일 1회 업데이트 → 1시간 캐시
  okx_ttl: 300               # OKX 펀딩비/L/S비율: 5분 캐시
  market_ttl: 300            # 도미넌스/VIX/DXY: 5분 캐시
  # ── CoinGecko ID 매핑 (ticker → CoinGecko API ID) ──
  coingecko_ids:
    BTC: bitcoin
    ETH: ethereum
    BNB: binancecoin
    SOL: solana
    XRP: ripple
    DOGE: dogecoin
    ADA: cardano
    AVAX: avalanche-2
    LINK: chainlink
    DOT: polkadot
    TON: the-open-network
    MATIC: matic-network
    UNI: uniswap
    LTC: litecoin
    BCH: bitcoin-cash
    APT: aptos
    NEAR: near
    OP: optimism
    ARB: arbitrum
    SUI: sui

# ══════════════════════════════════════════════════════════════════════════════
# Multi-Timeframe Trading System (v2)
# ══════════════════════════════════════════════════════════════════════════════

# ── Confluence Score 가중치 및 임계값 ──────────────────────────────────────
confluence:
  daily_bias_weight: 3        # 일봉 방향 일치 시 최대 +3
  tactical_4h_weight: 2       # 4H 방향 확인 시 최대 +2
  entry_signal_weight: 2      # 진입 TF 신호 강도 (confidence 1-5 → 0-2)
  macro_weight: 1             # 매크로 환경 (FGI, 펀딩비 등)
  top_trader_weight: 1        # Top Trader 정렬
  volume_weight: 1            # 거래량 서지 확인
  min_score: 1                # 최소 진입 점수 완화 — 거래 빈도 최대화
  # confluence → 포지션 크기 배수 (점수: 배수)
  score_to_size:
    1: 0.60                   # 1-2점: 60% (공격적 — 하락장)
    3: 0.80                   # 3-4점: 80%
    5: 1.00                   # 5+점: 풀 사이즈
    7: 1.00                   # 7+점: 풀 사이즈
  # confluence → 레버리지 (점수: 배수)  하락장 공격적 레버리지
  score_to_leverage:
    1: 2                      # 1-2점: 2x
    3: 3                      # 3-4점: 3x
    5: 5                      # 5+점: 5x
    7: 5                      # 7+점: 5x

# ── 자본 배분 (공유 풀 방식) ──────────────────────────────────────────────
capital_allocation:
  mode: shared_pool            # shared_pool: 전체 자본 공유 + 포지션 수 제한
  max_total_positions: 14      # 전체 동시 포지션 한도 확대 (단타 활성화)
  max_per_asset_pct: 0.30      # 종목당 최대 노출 30%
  max_single_position_pct: 0.30  # 단일 포지션 최대 크기 30%
  same_direction_limit_pct: 1.0   # 방향 편중 차단 비활성화 (하락장 숏 집중 허용)
  # Tier별 동시 포지션 상한
  tier_position_limits:
    daily: 5                  # 3 → 5: 하락장 daily 숏 확대
    4h: 5
    1h: 5
    15m: 5
  # 포지션 크기 = equity × asset_weight × tier_size_pct × confluence_mult
  tier_size_pct:
    daily: 0.30               # 0.25 → 0.30: SL 타이트해져 실질 위험 동일 → 더 큰 포지션
    4h: 0.25                  # 0.20 → 0.25
    1h: 0.25                  # 0.20 → 0.25
    15m: 0.10                 # 0.08 → 0.10: 단타 포지션 크기 소폭 확대

# ── Tier별 리스크 파라미터 ────────────────────────────────────────────────
risk_tiers:
  daily:
    atr_sl_mult: 1.5           # 2.0 → 1.5: 타이트 손절 (틀리면 빠른 컷)
    atr_tp_mult: 2.5           # 4.0 → 2.5: 빠른 익절 (수익 즉시 실현)
    atr_period: 14
    max_leverage: 5
    max_holding_days: 4        # 30 → 4: 자본 재활용 빠르게
    daily_loss_limit_pct: -0.20
  4h:
    atr_sl_mult: 1.2           # 2.0 → 1.2: 더 타이트
    atr_tp_mult: 2.0           # 4.0 → 2.0: 빠른 익절
    atr_period: 14
    max_leverage: 5
    max_holding_days: 2        # 14 → 2: 4h 포지션 이틀 이내 청산
    daily_loss_limit_pct: -0.15
  1h:
    atr_sl_mult: 0.9           # 1.8 → 0.9: 절반으로 타이트
    atr_tp_mult: 1.5           # 3.6 → 1.5: 빠른 익절
    atr_period: 14
    max_leverage: 5
    max_holding_hours: 12      # 48 → 12: 12시간 내 청산
    daily_loss_limit_pct: -0.12
  15m:
    atr_sl_mult: 0.5           # 0.6 → 0.5: 더 타이트
    atr_tp_mult: 0.9           # 1.2 → 0.9: 더 빠른 익절
    atr_period: 7
    max_leverage: 3
    max_holding_hours: 1       # 2h → 1h: 1시간 내 청산 원칙
    daily_loss_limit_pct: -0.08

# ── Tier별 전략 파라미터 ──────────────────────────────────────────────────
timeframe_strategies:
  daily:
    type: vb
    k: 0.08                    # 0.15 → 0.08: 돌파 민감도 대폭 완화 (신호 증가)
    ma_period: 200
    volume_multiplier: 1.0
    volume_lookback: 20
    vp_lookback: 20
    vp_bins: 50
    fib_lookback: 50
    use_supertrend: true
    supertrend_period: 7
    supertrend_multiplier: 2.0  # 3.0 → 2.0: Supertrend 더 민감하게 (하락 빠른 감지)
    use_macd_filter: false
    use_rsi_divergence: true
    use_bb_squeeze: false
  4h:
    type: vb
    k: 0.06                    # 0.12 → 0.06: 돌파 기준 대폭 완화
    ma_period: 200
    volume_multiplier: 1.0
    volume_lookback: 20
    vp_lookback: 20
    vp_bins: 40
    fib_lookback: 40
    use_supertrend: true
    supertrend_period: 7
    supertrend_multiplier: 2.0  # 3.0 → 2.0: 민감도 증가
    use_macd_filter: false
    use_rsi_divergence: true
    use_bb_squeeze: false
  1h:
    type: vb
    k: 0.04                    # 0.08 → 0.04: 1h 돌파 최대 완화
    ma_period: 50
    volume_multiplier: 1.0
    volume_lookback: 20
    vp_lookback: 20
    vp_bins: 30
    fib_lookback: 30
    use_supertrend: true
    supertrend_period: 7
    supertrend_multiplier: 2.0  # 3.0 → 2.0: 민감도 증가
    use_macd_filter: false
    use_rsi_divergence: true
    use_bb_squeeze: true
  15m:
    type: mr                   # mean_reversion
    rsi_oversold: 43           # 32→38→43: 더 완화 (더 많은 반등 신호)
    rsi_overbought: 57         # 68→62→57: 더 완화 (더 많은 하락 신호)
    bb_period: 14              # 20 → 14: 단기 밴드
    bb_std: 1.5                # 2.0→1.8→1.5: 밴드 더 좁혀 신호 대폭 증가
    vp_lookback: 20            # 40 → 20: 최근 5시간 집중
    vp_bins: 20
    atr_period: 7              # 14 → 7: 단기 ATR

# ── Tier별 거래 종목 (미지정 시 exchange_markets 기본값 사용) ─────────────
tier_markets:
  okx:
    daily: [KRW-BTC, KRW-ETH, KRW-BNB, KRW-SOL, KRW-XRP, KRW-DOGE, KRW-LINK, KRW-SUI]
    4h:    [KRW-BTC, KRW-ETH, KRW-BNB, KRW-SOL, KRW-XRP, KRW-DOGE, KRW-LINK, KRW-SUI]
    1h:    [KRW-BTC, KRW-ETH, KRW-BNB, KRW-SOL, KRW-XRP, KRW-DOGE, KRW-LINK, KRW-SUI]
    15m:   [KRW-XRP, KRW-DOGE, KRW-SOL, KRW-ETH, KRW-BNB, KRW-LINK, KRW-SUI]  # 단타 7종목 (XRP/DOGE 소액계약 우선)
    5m:    [KRW-BTC, KRW-ETH, KRW-SOL, KRW-XRP, KRW-DOGE]                  # 정밀 진입 5종목
    30m:   [KRW-BTC, KRW-ETH, KRW-BNB, KRW-SOL, KRW-XRP, KRW-DOGE, KRW-LINK, KRW-SUI]
  upbit:
    daily: []
    4h: []
    1h: []
    15m: []

# ── Advanced MTF Analysis (7TF) ─────────────────────────────────────────
mtf_analysis:
  timeframes: [day, minute240, minute60, minute30, minute15, minute5]
  tf_weights:
    day: 3.0
    minute240: 2.5
    minute60: 2.0
    minute30: 1.5
    minute15: 1.0
    minute5: 0.5
  alignment_threshold:
    long: 3.0                  # 10점 중 3 이상이면 롱 허용
    short: -3.0                # -3 이하면 숏 허용

# ── Regime Detection ─────────────────────────────────────────────────────
regime:
  adx_trending: 25
  adx_ranging: 20
  atr_volatile_pctl: 0.80
  vol_spike_mult: 3.0
  size_mult:
    trending: 1.0
    ranging: 0.7
    volatile: 0.5
  sl_tp_mult:
    trending: {sl: 1.5, tp: 3.0}
    ranging: {sl: 0.8, tp: 1.2}
    volatile: {sl: 2.0, tp: 2.0}

# ── Reversal / Dead Cat Bounce Detection ─────────────────────────────────
reversal_detection:
  min_conditions: 3            # Bear→Bull 전환: 5개 중 3개 충족
  dead_cat_bounce_conditions: 3  # 가짜 반등: 4개 중 3개 해당
  upbit:
