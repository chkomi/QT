<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quant Bot v2</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

  <!-- Hero -->
  <header id="hero">
    <div class="hero-main">
      <span class="hero-label">OKX Total</span>
      <div class="hero-amount" id="hero-amount">$0.00</div>
    </div>
    <div class="hero-sub">
      <span id="hero-upbit">Upbit ₩0</span>
      <span class="dot"></span>
      <span id="hero-bot" class="badge badge-off">BOT</span>
      <span class="dot"></span>
      <span id="hero-time">--:--</span>
      <button id="btn-refresh" class="btn-icon" title="Refresh">↻</button>
    </div>
  </header>

  <main>
    <!-- Positions -->
    <section id="sec-pos">
      <h2>Positions <span id="pos-count" class="badge">0</span></h2>
      <div id="pos-grid" class="pos-grid">
        <div class="empty">No open positions</div>
      </div>
    </section>

    <!-- Equity -->
    <section id="sec-equity">
      <h2>Equity</h2>
      <div id="equity-chart" class="chart-box" style="height:180px"></div>
    </section>

    <!-- Candle Chart -->
    <section id="sec-chart">
      <div class="tabs" id="tabs">
        <button class="tab active" data-c="KRW-BTC">BTC</button>
        <button class="tab" data-c="KRW-ETH">ETH</button>
        <button class="tab" data-c="KRW-SOL">SOL</button>
        <button class="tab" data-c="KRW-XRP">XRP</button>
        <button class="tab" data-c="KRW-DOGE">DOGE</button>
        <button class="tab" data-c="KRW-LINK">LINK</button>
        <button class="tab" data-c="KRW-SUI">SUI</button>
        <button class="tab" data-c="KRW-BNB">BNB</button>
      </div>
      <div id="candle-chart" class="chart-box" style="height:320px"></div>
    </section>

    <!-- Trades -->
    <section id="sec-trades">
      <h2>Trades <button id="btn-more" class="btn-text">more</button></h2>
      <div id="trades-list"></div>
    </section>

    <!-- Logs -->
    <section id="sec-log" class="collapsed">
      <h2 id="log-toggle" class="toggle-h">Logs <span class="caret">&#9654;</span></h2>
      <div id="log-box" class="log-box"></div>
    </section>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/charts.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
